spring:
  application:
    name: request-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/request_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      connection-timeout: 30000
      initialization-fail-timeout: 60000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  # JWT_SECRET MUST be injected via environment variable (Secrets Manager in AWS).
  # No fallback — service will refuse to start if the secret is missing.
  secret: ${JWT_SECRET}

app:
  vehicle-service-url: ${VEHICLE_SERVICE_URL:http://localhost:8081}
  maintenance-service-url: ${MAINTENANCE_SERVICE_URL:http://localhost:8082}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
    info:
      enabled: true
  info:
    env:
      enabled: true
    build:
      enabled: true

logging:
  level:
    com.fleetops: INFO

---
spring:
  config:
    activate:
      on-profile: dev
  flyway:
    locations: classpath:db/migration,classpath:db/dev-migration


